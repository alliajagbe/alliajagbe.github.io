<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Alli Ajagbe's portfolio - data science, analytics engineering, machine learning, and AI-driven decision systems."
    />
    <meta name="theme-color" content="#F4EFC9" />
    <title>Alli Ajagbe | Data Scientist, Analytics & AI Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/alliajagbe%20logo/2.png?v=20260404f" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("portfolio-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = storedTheme || (prefersDark ? "dark" : "light");
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css?v=20260415c" />
  </head>
  <body data-page="home">
    <div class="site-shell">
      <header class="site-header">
        <div class="container header-inner header-inner--home">
          <a class="brand" href="/" aria-label="Go to homepage">
            <span class="brand-mark">
              <img class="brand-logo" id="brand-logo" src="/assets/logo-icon.png?v=20260404e" alt="Alli Ajagbe logo" />
            </span>
            <span class="brand-name-group">
              <span class="brand-name" id="brand-name">Alli Ajagbe</span>
              <span class="brand-tag" id="brand-tag">Data science, analytics, and AI</span>
            </span>
          </a>

          <nav class="site-nav site-nav--home" aria-label="Primary navigation">
            <a href="#about" class="nav-link nav-link--anchor"><span>01.</span> About</a>
            <a href="#experience" class="nav-link nav-link--anchor"><span>02.</span> Experience</a>
            <a href="#work" class="nav-link nav-link--anchor"><span>03.</span> Work</a>
            <a href="#contact" class="nav-link nav-link--anchor"><span>04.</span> Contact</a>
          </nav>

          <div class="header-actions">
            <button class="theme-toggle" id="theme-toggle" type="button" aria-pressed="false" aria-label="Activate dark mode">
              <span class="theme-toggle__track" aria-hidden="true"><span class="theme-toggle__thumb"></span></span>
              <span class="theme-toggle__label" id="theme-toggle-label">Light</span>
            </button>
            <a class="resume-button" href="/AlliAjagbeResume.pdf" target="_blank" rel="noreferrer">Resume</a>
          </div>
        </div>
      </header>

      <main class="editor-home" id="top">
        <aside class="edge-rail edge-rail--left" id="home-social-rail" aria-label="Social links"></aside>
        <aside class="edge-rail edge-rail--right" id="home-email-rail" aria-label="Email"></aside>

        <section class="editor-home__hero" aria-labelledby="home-title">
          <div class="container editor-home__container">
            <div class="editor-home__hero-copy" id="home-hero-copy"></div>
          </div>
        </section>

        <section class="editor-home__section" id="about" aria-labelledby="about-title">
          <div class="container editor-home__container">
            <div class="editor-home__heading">
              <p class="editor-home__number">01.</p>
              <h2 id="about-title">About</h2>
              <span class="editor-home__line" aria-hidden="true"></span>
            </div>
            <div class="editor-home__about-grid">
              <div class="editor-home__copy" id="home-about-copy"></div>
              <div class="editor-home__aside" id="home-about-aside"></div>
            </div>
            <div class="editor-home__tech">
              <p class="editor-home__eyebrow">Some tools I use</p>
              <div class="editor-home__tech-list" id="home-about-tech"></div>
            </div>
          </div>
        </section>

        <section class="editor-home__section" id="experience" aria-labelledby="experience-title">
          <div class="container editor-home__container">
            <div class="editor-home__heading">
              <p class="editor-home__number">02.</p>
              <h2 id="experience-title">Experience</h2>
              <span class="editor-home__line" aria-hidden="true"></span>
            </div>
            <div class="editor-home__experience-grid">
              <div class="editor-home__tabs" id="home-experience-tabs" role="tablist" aria-label="Experience"></div>
              <div class="editor-home__tab-panel" id="home-experience-panel"></div>
            </div>
          </div>
        </section>

        <section class="editor-home__section" id="work" aria-labelledby="work-title">
          <div class="container editor-home__container">
            <div class="editor-home__heading">
              <p class="editor-home__number">03.</p>
              <h2 id="work-title">Selected Work</h2>
              <span class="editor-home__line" aria-hidden="true"></span>
            </div>
            <div class="editor-home__featured-work" id="home-featured-work"></div>
            <div class="editor-home__more-work" id="home-more-work" hidden></div>
            <div class="editor-home__actions">
              <button class="ghost-button" id="home-work-toggle" type="button" aria-expanded="false">Show More</button>
            </div>
          </div>
        </section>

        <section class="editor-home__section editor-home__section--contact" id="contact" aria-labelledby="contact-title">
          <div class="container editor-home__container editor-home__container--narrow">
            <div class="editor-home__contact" id="home-contact-copy"></div>
          </div>
        </section>
      </main>

      <footer class="site-footer site-footer--minimal">
        <div class="container site-footer--minimal__inner">
          <p>Designed and built by <span id="footer-year-name">Alli Ajagbe</span>.</p>
        </div>
      </footer>
    </div>

    <script src="/content.js?v=20260415c" defer></script>
    <script src="/script.js?v=20260415c" defer></script>
  </body>
</html>
